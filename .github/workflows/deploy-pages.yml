name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create environment files
        run: |
          mkdir -p src/environments
          cat > src/environments/environment.ts <<'EOF'
          export const environment = {
            production: false,
            emailjs: {
              publicKey: '${{ secrets.EMAILJS_PUBLIC_KEY }}',
              serviceId: '${{ secrets.EMAILJS_SERVICE_ID }}',
              templateId: '${{ secrets.EMAILJS_TEMPLATE_ID }}',
            },
          };
          EOF
          cat > src/environments/environment.prod.ts <<'EOF'
          export const environment = {
            production: true,
            emailjs: {
              publicKey: '${{ secrets.EMAILJS_PUBLIC_KEY }}',
              serviceId: '${{ secrets.EMAILJS_SERVICE_ID }}',
              templateId: '${{ secrets.EMAILJS_TEMPLATE_ID }}',
            },
          };
          EOF

      - name: Build
        run: npx ng build --configuration production --base-href /portfolio-website/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/portfolio-website/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
